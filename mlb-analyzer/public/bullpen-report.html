<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bullpen Report — MLB Betting Analyzer</title>
<style>
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#efefed;
  --text:#1a1a18;--text2:#6b6b68;--text3:#9a9a96;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);
  --r-md:8px;--r-lg:12px;
  --green:#0f5c30;--green-bg:#d4f0e0;--green-border:#9fdfbb;
  --yellow:#b07a00;--yellow-bg:#faeeda;--yellow-border:#f5c475;
  --red:#a02020;--red-bg:#fde8e8;--red-border:#f09595;
  --blue:#185fa5;--blue-bg:#e6f1fb;
  --navy:#1a3a5c;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#f0f0ec;--text2:#a0a09c;--text3:#6a6a66;
    --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
    --green:#3dd68c;--green-bg:rgba(13,90,48,.3);--green-border:#1a7a4a;
    --yellow:#f5c475;--yellow-bg:rgba(120,80,0,.3);--yellow-border:#b07a00;
    --red:#f09595;--red-bg:rgba(120,20,20,.3);--red-border:#a02020;
    --blue:#7fb3e6;--blue-bg:rgba(24,95,165,.2);
  }
}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;margin:0}
.app{max-width:1200px;margin:0 auto;padding:1rem}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.hdr-icon{width:38px;height:38px;background:var(--navy);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;flex-shrink:0}
.ttl{font-size:20px;font-weight:500;color:var(--text)}
.sub{font-size:12px;color:var(--text2);margin-top:2px}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.ctl-lbl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
input[type=date], .btn{padding:7px 12px;font-size:12px;border:.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg);color:var(--text);font-family:inherit}
.btn{cursor:pointer;font-weight:500}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-primary:hover{background:#143050}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--bg2)}
.toggle{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none;font-size:12px;color:var(--text2)}
.toggle input{margin:0}
.game-section{margin-bottom:1.5rem}
.game-head{font-size:16px;font-weight:500;color:var(--text);margin-bottom:.75rem;padding:8px 14px;background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-md);display:flex;justify-content:space-between;align-items:center;gap:12px}
.game-id{font-size:11px;color:var(--text3);font-family:monospace}
.teams{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:800px){.teams{grid-template-columns:1fr}}
.team-card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r-lg);padding:12px 14px}
.team-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;padding-bottom:6px;border-bottom:.5px solid var(--border)}
.team-name{font-size:14px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text)}
.team-sp{font-size:11px;color:var(--text2)}
.team-sp b{color:var(--text);font-weight:500}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl thead th{padding:5px 4px;font-weight:500;color:var(--text2);font-size:10px;text-transform:uppercase;border-bottom:.5px solid var(--border2);text-align:center;white-space:nowrap}
.tbl th:first-child,.tbl td:first-child{text-align:left;padding-left:4px}
.tbl td{padding:5px 4px;border-bottom:.5px solid var(--border);text-align:center;vertical-align:middle;white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.out-of-pool{opacity:.55}
.tbl tr.is-fatigued{opacity:.6;background:rgba(176,122,0,.05)}
.tbl tr.is-sp td:first-child::after{content:' ★';color:var(--yellow);font-size:9px}
.fatigue-badge{display:inline-block;margin-left:6px;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:600;background:var(--yellow-bg);color:var(--yellow);border:.5px solid var(--yellow-border);letter-spacing:.02em;opacity:.85}
.fatigue-badge + .fatigue-badge{margin-left:3px}
.name{font-weight:500;color:var(--text)}
.role-sp{color:var(--blue);font-weight:500}
.role-rp{color:var(--text2)}
.hand{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:600}
.hR{background:var(--blue-bg);color:var(--navy)}
.hL{background:#f5e8dc;color:#5c3a1a}
@media(prefers-color-scheme:dark){.hL{background:rgba(180,120,60,.2);color:#e5b988}}
.hS{background:var(--bg3);color:var(--text2)}
.muted{color:var(--text3)}
.num{font-variant-numeric:tabular-nums}
.proj{color:var(--text2)}
.act{color:var(--text2)}
.blend{color:var(--text);font-weight:500}
.pool-yes{color:var(--green);font-weight:600}
.pool-no{color:var(--text3)}
.team-footer{margin-top:10px;padding:12px 14px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:var(--r-md);font-size:11px}
.team-footer-hero{text-align:center;padding-bottom:8px;margin-bottom:8px;border-bottom:.5px solid var(--green-border)}
.team-footer-hero .hl{color:var(--green);text-transform:uppercase;letter-spacing:.08em;font-size:10px;font-weight:700;display:block;margin-bottom:2px}
.team-footer-hero .hv{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums;font-size:22px;line-height:1.1}
.team-footer-hero .hsub{color:var(--text2);font-size:9px;text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
.team-footer-row{display:flex;justify-content:space-around;align-items:center;gap:8px;flex-wrap:wrap}
.team-footer .fl{color:var(--green);text-transform:uppercase;letter-spacing:.05em;font-size:10px;font-weight:600;margin-right:4px}
.team-footer .fv{color:var(--text);font-weight:600;font-variant-numeric:tabular-nums;font-size:12px}
.team-footer .fn{color:var(--text2);font-weight:500;font-size:10px}
.team-footer-note{margin-top:6px;padding-top:6px;border-top:.5px dashed var(--green-border);text-align:center;font-size:10px;color:var(--text2)}
.team-footer-note b{color:var(--yellow);font-weight:600}
.status{font-size:12px;color:var(--text2);padding:8px 0}
.status.err{color:var(--red)}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid var(--border2);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;vertical-align:-1px;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.meta{font-size:11px;color:var(--text2);margin-left:auto}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-icon">BP</div>
    <div>
      <div class="ttl">Bullpen Report</div>
      <div class="sub" id="hdr-sub">Per-pitcher wOBA breakdown for each game</div>
    </div>
  </div>

  <div class="card">
    <div class="controls">
      <span class="ctl-lbl">Date</span>
      <input type="date" id="date-input">
      <label class="toggle"><input type="checkbox" id="pool-only"> In-pool pitchers only</label>
      <button class="btn btn-ghost btn-sm" id="refresh-btn">Refresh</button>
      <span class="meta" id="meta"></span>
    </div>
  </div>

  <div id="status" class="status"></div>
  <div id="games"></div>
</div>

<script>
// ES5-only: no arrow functions, const/let, template literals, async/await,
// optional chaining, or fetch. Transport is XMLHttpRequest.

var dateInput = document.getElementById('date-input');
var poolOnly = document.getElementById('pool-only');
var refreshBtn = document.getElementById('refresh-btn');
var statusEl = document.getElementById('status');
var gamesEl = document.getElementById('games');
var metaEl = document.getElementById('meta');

var currentData = null;

var HTML_ESC = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
function escapeHtml(s) {
  s = String(s == null ? '' : s);
  return s.replace(/[&<>"']/g, function(c) { return HTML_ESC[c]; });
}

function todayET() {
  // YYYY-MM-DD in Eastern Time. en-CA locale produces ISO-style date.
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
}

function fmtWoba(v) {
  if (v == null) return '<span class="muted">\u2014</span>';
  return '<span class="num">' + Number(v).toFixed(4) + '</span>';
}

function handPill(h) {
  if (!h) return '<span class="hand hS">?</span>';
  var cls = h === 'R' ? 'hR' : (h === 'L' ? 'hL' : 'hS');
  return '<span class="hand ' + cls + '">' + h + '</span>';
}

function roleBadge(role) {
  var cls = role === 'SP' ? 'role-sp' : 'role-rp';
  return '<span class="' + cls + '">' + role + '</span>';
}

function countInPool(pitchers) {
  var n = 0;
  for (var i = 0; i < pitchers.length; i++) if (pitchers[i].in_pool) n++;
  return n;
}

function countFatigued(pitchers) {
  var n = 0;
  for (var i = 0; i < pitchers.length; i++) if (pitchers[i].fatigued) n++;
  return n;
}

function renderTeam(team, teamAbbr) {
  var allPitchers = team.pitchers || [];
  var pitchers = poolOnly.checked
    ? allPitchers.filter(function(p) { return p.in_pool; })
    : allPitchers;

  var rowsHtml = '';
  for (var i = 0; i < pitchers.length; i++) {
    var p = pitchers[i];
    var classes = [];
    if (!p.in_pool) classes.push('out-of-pool');
    if (p.fatigued) classes.push('is-fatigued');
    if (p.name === team.sp_name) classes.push('is-sp');

    var badges = '';
    var reasons = p.fatigue_reasons || [];
    for (var j = 0; j < reasons.length; j++) {
      var r = reasons[j];
      badges += '<span class="fatigue-badge" title="Excluded for fatigue: ' + escapeHtml(r) + '">' + escapeHtml(r) + '</span>';
    }

    rowsHtml += '<tr class="' + classes.join(' ') + '">'
      + '<td><span class="name">' + escapeHtml(p.name) + '</span>' + badges + '</td>'
      + '<td>' + roleBadge(p.role || '?') + '</td>'
      + '<td>' + handPill(p.hand) + '</td>'
      + '<td class="proj">' + fmtWoba(p.proj_vs_lhb) + '</td>'
      + '<td class="proj">' + fmtWoba(p.proj_vs_rhb) + '</td>'
      + '<td class="act">' + fmtWoba(p.act_vs_lhb) + '</td>'
      + '<td class="act">' + fmtWoba(p.act_vs_rhb) + '</td>'
      + '<td class="blend">' + fmtWoba(p.blended_vs_lhb) + '</td>'
      + '<td class="blend">' + fmtWoba(p.blended_vs_rhb) + '</td>'
      + '<td>' + (p.in_pool ? '<span class="pool-yes">YES</span>' : '<span class="pool-no">no</span>') + '</td>'
      + '</tr>';
  }

  var emptyRow = pitchers.length
    ? ''
    : '<tr><td colspan="10" class="muted" style="text-align:center;padding:12px">No pitchers to show</td></tr>';

  var poolCount = countInPool(allPitchers);
  var fatigueCount = countFatigued(allPitchers);
  var lhb = team.team_bullpen_woba_vs_lhb != null ? Number(team.team_bullpen_woba_vs_lhb).toFixed(3) : '\u2014';
  var rhb = team.team_bullpen_woba_vs_rhb != null ? Number(team.team_bullpen_woba_vs_rhb).toFixed(3) : '\u2014';
  var model = team.team_bullpen_woba != null ? Number(team.team_bullpen_woba).toFixed(3) : '\u2014';

  var fatigueNote;
  if (fatigueCount > 0) {
    fatigueNote = '<div class="team-footer-note"><b>' + fatigueCount + '</b> '
      + (fatigueCount === 1 ? 'pitcher' : 'pitchers') + ' excluded for fatigue</div>';
  } else {
    fatigueNote = '<div class="team-footer-note">No pitchers excluded for fatigue</div>';
  }

  var spLine = team.sp_name
    ? '<b>' + escapeHtml(team.sp_name) + '</b>'
    : '<span class="muted">TBD</span>';

  return ''
    + '<div class="team-card">'
    +   '<div class="team-head">'
    +     '<div class="team-name">' + escapeHtml(teamAbbr || '') + '</div>'
    +     '<div class="team-sp">SP: ' + spLine + '</div>'
    +   '</div>'
    +   '<div style="overflow-x:auto">'
    +   '<table class="tbl">'
    +     '<thead><tr>'
    +       '<th>Pitcher</th><th>Role</th><th>Hand</th>'
    +       '<th>Proj L</th><th>Proj R</th>'
    +       '<th>Act L</th><th>Act R</th>'
    +       '<th>Blend L</th><th>Blend R</th>'
    +       '<th>Pool</th>'
    +     '</tr></thead>'
    +     '<tbody>' + rowsHtml + emptyRow + '</tbody>'
    +   '</table>'
    +   '</div>'
    +   '<div class="team-footer" title="Model wOBA is the strong/weak manager blend (min*0.65 + max*0.35) of the per-side pool averages \u2014 this is the single number the model feeds into perBatterEW">'
    +     '<div class="team-footer-hero">'
    +       '<span class="hl">Model wOBA</span>'
    +       '<span class="hv">' + model + '</span>'
    +       '<div class="hsub">strong 65% \u00b7 weak 35%</div>'
    +     '</div>'
    +     '<div class="team-footer-row">'
    +       '<div><span class="fl">Pool vs LHB</span><span class="fv">' + lhb + '</span></div>'
    +       '<div><span class="fl">Pool vs RHB</span><span class="fv">' + rhb + '</span></div>'
    +       '<div><span class="fl">Pool size</span><span class="fv">' + poolCount + '</span><span class="fn"> of ' + allPitchers.length + '</span></div>'
    +     '</div>'
    +     fatigueNote
    +   '</div>'
    + '</div>';
}

function render(data) {
  currentData = data;
  if (!data || !data.games || data.games.length === 0) {
    var fallbackDate = (data && data.date) || '';
    gamesEl.innerHTML = '<div class="card muted" style="text-align:center">No games found for ' + escapeHtml(fallbackDate) + '</div>';
    metaEl.textContent = '';
    return;
  }
  var weights = data.weights || {};
  metaEl.innerHTML = data.game_count + ' games \u00b7 W_PROJ=' + weights.W_PROJ + ' \u00b7 W_ACT=' + weights.W_ACT;

  var html = '';
  for (var i = 0; i < data.games.length; i++) {
    var g = data.games[i];
    html += ''
      + '<div class="game-section">'
      +   '<div class="game-head">'
      +     '<div>' + escapeHtml((g.away_team || '').toUpperCase()) + ' @ ' + escapeHtml((g.home_team || '').toUpperCase()) + '</div>'
      +     '<div class="game-id">' + escapeHtml(g.game_id) + '</div>'
      +   '</div>'
      +   '<div class="teams">'
      +     renderTeam(g.away, g.away_team)
      +     renderTeam(g.home, g.home_team)
      +   '</div>'
      + '</div>';
  }
  gamesEl.innerHTML = html;
}

function showError(msg) {
  statusEl.className = 'status err';
  statusEl.textContent = 'Error: ' + msg;
}

function load() {
  var date = dateInput.value || todayET();
  statusEl.className = 'status';
  statusEl.innerHTML = '<span class="spinner"></span>Loading ' + escapeHtml(date) + '\u2026';
  gamesEl.innerHTML = '';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/api/debug/bullpen-report?date=' + encodeURIComponent(date), true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status < 200 || xhr.status >= 300) {
      showError('HTTP ' + xhr.status);
      return;
    }
    var data;
    try {
      data = JSON.parse(xhr.responseText);
    } catch (e) {
      showError('invalid JSON response');
      return;
    }
    if (data && data.error) {
      showError(data.error);
      return;
    }
    statusEl.textContent = '';
    render(data);
  };
  xhr.onerror = function() { showError('network failure'); };
  xhr.send();
}

function onPoolOnlyChange() {
  if (currentData) render(currentData);
}

dateInput.value = todayET();
dateInput.addEventListener('change', load);
poolOnly.addEventListener('change', onPoolOnlyChange);
refreshBtn.addEventListener('click', load);
load();
</script>
</body>
</html>
