<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Betting Analyzer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#ffffff;--bg2:#f5f5f4;--bg3:#efefed;
--text:#1a1a18;--text2:#6b6b68;--text3:#9a9a96;
--border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);
--r-md:8px;--r-lg:12px;
--green:#0f5c30;--green-bg:#d4f0e0;--green-border:#9fdfbb;
--yellow:#b07a00;--yellow-bg:#faeeda;--yellow-border:#f5c475;
--red:#a02020;--red-bg:#fde8e8;--red-border:#f09595;
--blue:#185fa5;--blue-bg:#e6f1fb;
--navy:#1a3a5c;
}
@media(prefers-color-scheme:dark){
:root{
--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
--text:#f0f0ec;--text2:#a0a09c;--text3:#6a6a66;
--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.2);
--green:#3dd68c;--green-bg:rgba(13,90,48,.3);--green-border:#1a7a4a;
--yellow:#f5c475;--yellow-bg:rgba(120,80,0,.3);--yellow-border:#b07a00;
--red:#f09595;--red-bg:rgba(120,20,20,.3);--red-border:#a02020;
--blue-bg:rgba(24,95,165,.2);
}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1rem}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.hdr-icon{width:38px;height:38px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ttl{font-size:20px;font-weight:500;color:var(--text)}
.sub{font-size:12px;color:var(--text2);margin-top:2px}
.tabs{display:flex;border-bottom:.5px solid var(--border);margin-bottom:1.25rem;overflow-x:auto;background:var(--bg);border-radius:var(--r-lg) var(--r-lg) 0 0;padding:0 .5rem}
.tab{padding:10px 14px;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;font-family:inherit}
.tab.active{color:var(--text);border-bottom-color:var(--navy);font-weight:500}
.sec{display:none}.sec.active{display:block}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--r-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.card-warn{background:var(--yellow-bg);border:.5px solid var(--yellow-border);border-radius:var(--r-lg);padding:.75rem 1rem;margin-bottom:1rem;font-size:12px;color:var(--yellow);line-height:1.6}
.notice{font-size:12px;color:var(--text2);background:var(--bg2);border-radius:var(--r-md);padding:8px 12px;margin-bottom:10px;line-height:1.6}
.notice.ok{background:var(--green-bg);color:var(--green);border:.5px solid var(--green-border)}
.notice.warn{background:var(--yellow-bg);color:var(--yellow)}
.notice.info{background:var(--blue-bg);color:var(--blue)}
.slabel{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.btn{padding:8px 16px;font-size:12px;font-weight:500;border:none;border-radius:var(--r-md);cursor:pointer;font-family:inherit}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:#143050}
.btn-ghost{background:transparent;color:var(--text2);border:.5px solid var(--border2)}.btn-ghost:hover{background:var(--bg2)}
.btn-sm{padding:5px 12px;font-size:11px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.chip{display:inline-flex;align-items:center;padding:2px 6px;border-radius:10px;font-size:10px;font-weight:500}
.chip-blend{background:var(--green-bg);color:var(--green)}
.chip-steamer{background:var(--blue-bg);color:var(--blue)}
.chip-actual{background:var(--yellow-bg);color:var(--yellow)}
.chip-dflt{background:var(--bg3);color:var(--text2)}
.hbadge{display:inline-block;width:18px;height:18px;border-radius:3px;font-size:9px;font-weight:500;text-align:center;line-height:18px}
.hR{background:var(--blue-bg);color:var(--navy)}.hL{background:#f5e8dc;color:#5c3a1a}
.drop-zone{border:2px dashed var(--border2);border-radius:var(--r-lg);padding:2rem;text-align:center;cursor:pointer;position:relative;transition:all .2s;background:var(--bg2)}
.drop-zone:hover,.drop-zone.over{border-color:var(--navy);background:rgba(26,58,92,.05)}
.drop-zone.has-files{border-color:var(--green);border-style:solid}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px}
.file-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r-md);background:var(--bg);border:.5px solid var(--border);font-size:11px}
.file-item.loaded{background:var(--green-bg);border-color:var(--green-border)}
.file-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.file-dot.ok{background:var(--green)}.file-dot.err{background:var(--red)}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.gcard{background:var(--bg2);border:.5px solid var(--border);border-radius:var(--r-lg);padding:12px 14px}
.gteams{font-size:14px;font-weight:500;margin-bottom:2px}
.gtime{font-size:10px;color:var(--text3);margin-bottom:2px}
.gsp{font-size:11px;color:var(--text2);margin-bottom:5px}
.godds{display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:12px}
.gml{font-weight:500}.gtot{color:var(--text2)}
.gactions{display:flex;gap:6px;margin-top:8px}
.gcard-btn{flex:1;padding:7px 8px;font-size:11px;font-weight:500;border:none;border-radius:var(--r-md);cursor:pointer;font-family:inherit}
.ga-analyze{background:var(--navy);color:#fff}
.ga-matchup{background:transparent;border:.5px solid var(--border2);color:var(--text2)}
.gresult{margin-top:10px;padding-top:10px;border-top:.5px solid var(--border);display:none}
.gresult.show{display:block}
.result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.rbox{border-radius:var(--r-md);padding:7px 8px;text-align:center;background:var(--bg);border:.5px solid var(--border)}
.rbox.value{background:var(--green-bg);border-color:var(--green-border)}
.rbox-label{font-size:9px;color:var(--text2);margin-bottom:2px}
.rbox-val{font-size:16px;font-weight:500}
.rbox-mkt{font-size:9px;color:var(--text2)}
.rbox-verdict{font-size:9px;font-weight:500;margin-top:2px}
.mu-btn{padding:5px 10px;font-size:11px;font-weight:500;border:.5px solid var(--border2);border-radius:var(--r-md);cursor:pointer;background:var(--bg2);color:var(--text2);font-family:inherit}
.mu-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.mu-tbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.mu-tbl thead th{padding:5px 4px 6px;font-weight:500;color:var(--text2);font-size:10px;text-transform:uppercase;border-bottom:.5px solid var(--border2);text-align:center;white-space:normal;line-height:1.35;vertical-align:bottom}
.mu-tbl thead th:nth-child(2){text-align:left}
.mu-tbl td{padding:4px;border-bottom:.5px solid var(--border);text-align:center;vertical-align:middle}
.mu-tbl td:nth-chi
